<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="stylesheet" href="lamport.css">
    <title>Lamport Executive Simulator</title>
</head>
<body>
<div class="container">
    <header>
        <h1 style="margin:0; font-size: 1.5rem;">Auditoría de Exclusión Mutua: Lamport</h1>
